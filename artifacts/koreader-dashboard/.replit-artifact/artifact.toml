kind = "web"
previewPath = "/"
title = "KOReader Dashboard"
version = "1.0.0"
id = "artifacts/koreader-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18371

[services.development]
run = "pnpm --filter @workspace/koreader-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/koreader-dashboard", "run", "build" ]
publicDir = "artifacts/koreader-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18371"
BASE_PATH = "/"
