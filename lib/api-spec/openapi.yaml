openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KOReader Smart Library + Progress Sync API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stats
    description: Reading statistics
  - name: library
    description: Library search
  - name: covers
    description: Book cover images
  - name: sync
    description: KOReader progress sync
  - name: settings
    description: Application settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /koreader/stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get reading statistics
      description: Returns aggregate reading stats, recent activity, and user breakdowns
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /koreader/search:
    get:
      operationId: searchLibrary
      tags: [library]
      summary: Search library
      description: Search the book library by title or filename
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
        - name: ext
          in: query
          required: false
          schema:
            type: string
          description: Filter by file extension (epub, pdf, etc)
        - name: cover
          in: query
          required: false
          schema:
            type: string
          description: Set to "1" to only return books with covers
        - name: recent
          in: query
          required: false
          schema:
            type: string
          description: Set to "1" to only return books with reading progress
        - name: user
          in: query
          required: false
          schema:
            type: string
          description: Filter to books that have progress for this username
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [in_progress, completed, not_started]
          description: Filter by reading status (in_progress, completed, or not_started)
        - name: lang
          in: query
          required: false
          schema:
            type: string
          description: Filter by epub language tag (e.g. en, de, fr)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [recent, title, author, progress]
          description: Sort order (recent = last read first, title = A-Z, author = A-Z by author, progress = % descending)
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookCard"

  /koreader/cover/{md5}:
    get:
      operationId: getCover
      tags: [covers]
      summary: Get book cover image
      description: Returns book cover image by MD5 hash. Returns SVG placeholder if no cover exists.
      parameters:
        - name: md5
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cover image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string

  /koreader/users/create:
    post:
      operationId: registerUser
      tags: [sync]
      summary: Register a new user
      description: >
        KOReader user registration. password is the MD5 hash of the user's
        password, hashed client-side by KOReader before sending.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserBody"
      responses:
        "201":
          description: User registered
        "402":
          description: Username already registered

  /koreader/users/auth:
    get:
      operationId: getAuth
      tags: [sync]
      summary: Authenticate user
      description: >
        KOReader user authentication. Credentials passed via
        x-auth-user and x-auth-key request headers.
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /koreader/syncs/progress/{document}:
    get:
      operationId: getSyncProgress
      tags: [sync]
      summary: Get reading progress for a document
      description: >
        Returns stored reading progress for a document MD5.
        Credentials passed via x-auth-user and x-auth-key headers.
      parameters:
        - name: document
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Progress data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncProgress"
        "404":
          description: Not found

  /koreader/syncs/progress:
    put:
      operationId: updateSyncProgress
      tags: [sync]
      summary: Update reading progress for a document
      description: >
        Saves reading progress for a document.
        Credentials passed via x-auth-user and x-auth-key headers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncProgressUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncProgress"

  /koreader/settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      description: Returns current settings including library path and data directory info
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      description: Update settings. Triggers a library rescan if library_path changes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /koreader/settings/scan:
    post:
      operationId: triggerScan
      tags: [settings]
      summary: Trigger library scan
      description: Manually trigger a recursive scan of the configured library path
      responses:
        "200":
          description: Scan started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"

  /koreader/settings/rebuild:
    post:
      operationId: rebuildCache
      tags: [settings]
      summary: Rebuild MD5 cache
      description: Wipe the existing MD5 cache and run a full scan from scratch
      responses:
        "200":
          description: Rebuild started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"

  /koreader/settings/scan/status:
    get:
      operationId: getScanStatus
      tags: [settings]
      summary: Get scan status
      description: Returns current scan status and progress
      responses:
        "200":
          description: Scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BookCard:
      type: object
      properties:
        md5:
          type: string
        name:
          type: string
        display_title:
          type: string
        display_author:
          type: string
        path:
          type: ["string", "null"]
        ext:
          type: string
        folder:
          type: string
        size_human:
          type: string
        mtime_iso:
          type: string
        has_cover:
          type: boolean
        last_progress:
          type: number
        last_read_iso:
          type: string
        last_user:
          type: string
        last_device:
          type: string
        last_ts:
          type: number
        epub_has_meta:
          type: boolean
        epub_title:
          type: string
        epub_authors:
          type: array
          items:
            type: string
        epub_publisher:
          type: string
        epub_language:
          type: string
        epub_date:
          type: string
        epub_series:
          type: string
        epub_series_index:
          type: string
        epub_subjects:
          type: array
          items:
            type: string
        epub_identifiers:
          type: array
          items:
            type: string
        epub_description:
          type: string
        epub_page_count:
          type: number
      required:
        - md5
        - name
        - display_title
        - display_author
        - ext
        - folder
        - size_human
        - mtime_iso
        - has_cover
        - last_progress
        - last_read_iso
        - last_user
        - last_device
        - last_ts
        - epub_has_meta
        - epub_title
        - epub_authors
        - epub_publisher
        - epub_language
        - epub_date
        - epub_series
        - epub_series_index
        - epub_subjects
        - epub_identifiers
        - epub_description
        - epub_page_count

    UserStat:
      type: object
      properties:
        user:
          type: string
        books:
          type: number
        last_ts:
          type: number
        last_iso:
          type: string
        devices:
          type: array
          items:
            type: string
      required:
        - user
        - books
        - last_ts
        - last_iso
        - devices

    StatsResponse:
      type: object
      properties:
        active_books:
          type: number
        completed:
          type: number
        in_progress:
          type: number
        not_started:
          type: number
        avg_progress:
          type: number
        users:
          type: number
        last_activity_iso:
          type: string
        last_activity_age:
          type: string
        days_active_last14:
          type: number
        activity_by_day:
          type: object
          additionalProperties:
            type: number
          description: Map of ISO date string to sync count for the last 16 weeks
        top_recent:
          type: array
          items:
            $ref: "#/components/schemas/BookCard"
        users_breakdown:
          type: array
          items:
            $ref: "#/components/schemas/UserStat"
      required:
        - active_books
        - completed
        - in_progress
        - not_started
        - avg_progress
        - users
        - last_activity_iso
        - last_activity_age
        - days_active_last14
        - activity_by_day
        - top_recent
        - users_breakdown

    SyncProgress:
      type: object
      properties:
        document:
          type: string
        progress:
          type: string
        percentage:
          type: number
        device:
          type: string
        device_id:
          type: string
        timestamp:
          type: number
      required:
        - document
        - progress
        - percentage
        - device
        - device_id
        - timestamp

    RegisterUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          description: MD5-hashed password (hashed client-side by KOReader)
      required:
        - username
        - password

    SyncProgressUpdate:
      type: object
      properties:
        document:
          type: string
          description: MD5 hash identifying the document
        progress:
          type: string
        percentage:
          type: number
        device:
          type: string
        device_id:
          type: string
      required:
        - document
        - progress
        - percentage
        - device
        - device_id

    AuthResponse:
      type: object
      properties:
        authorized:
          type: boolean
        user:
          type: string
      required:
        - authorized
        - user

    Settings:
      type: object
      properties:
        library_path:
          type: string
          description: Absolute path to the root ebook library directory (scanned recursively)
        data_dir:
          type: string
          description: Absolute path to the data directory where progress sync files are stored
        users_dir:
          type: string
          description: Absolute path to the users directory (auth.json and [MD5].json files per user)
        covers_dir:
          type: string
          description: Absolute path to the covers directory
        cache_file:
          type: string
          description: Absolute path to the book-md5-cache.json file
        book_count:
          type: number
          description: Number of books currently indexed in the library
        last_scan_iso:
          type: string
          description: ISO timestamp of the last library scan
        supported_extensions:
          type: array
          items:
            type: string
          description: File extensions that are scanned for library indexing
      required:
        - library_path
        - data_dir
        - users_dir
        - covers_dir
        - cache_file
        - book_count
        - last_scan_iso
        - supported_extensions

    SettingsUpdate:
      type: object
      properties:
        library_path:
          type: string
          description: Absolute path to the root ebook library directory
      required:
        - library_path

    ScanStatus:
      type: object
      properties:
        running:
          type: boolean
        files_found:
          type: number
        files_processed:
          type: number
        current_file:
          type: string
        started_at:
          type: string
        finished_at:
          type: string
        error:
          type: string
      required:
        - running
        - files_found
        - files_processed
        - current_file
        - started_at
        - finished_at
        - error
