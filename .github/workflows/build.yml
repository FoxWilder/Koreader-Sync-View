name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Build — runs on every push and every PR
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: $(pnpm store path --silent)
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run codegen
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Typecheck
        run: pnpm run typecheck

      # ── Compute auto-version ──────────────────
      - name: Compute version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version")
          VERSION="v${BASE}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing $VERSION"

      # ── Build dashboard for GitHub Pages first (different base path) ──
      # Must run before the server dashboard build so the Pages output is
      # saved before dist/public is overwritten with BASE_PATH=/.
      - name: Build dashboard for GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pnpm --filter @workspace/koreader-dashboard run build
        env:
          BASE_PATH: /Koreader-Sync-View/
          PORT: 3000

      - name: Save Pages build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cp -r artifacts/koreader-dashboard/dist/public artifacts/koreader-dashboard/dist/pages

      # ── Build dashboard (BASE_PATH=/ for the server bundle) ──
      - name: Build dashboard
        run: pnpm --filter @workspace/koreader-dashboard run build
        env:
          BASE_PATH: /
          PORT: 3000

      # ── Build API server ──────────────────────
      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      # ── Bundle release: copy dashboard into server dist ──
      - name: Bundle release
        run: |
          # Copy static dashboard files (BASE_PATH=/) into the server dist
          cp -r artifacts/koreader-dashboard/dist/public artifacts/api-server/dist/public

          mkdir -p release-bundle
          cp artifacts/api-server/dist/* release-bundle/ 2>/dev/null || true
          cp -r artifacts/api-server/dist/public release-bundle/public
          cp koreader-sync.ps1 release-bundle/

          echo "Bundle contents:"
          find release-bundle -type f | sort

      # ── Upload server bundle as artifact ─────────
      - name: Upload server bundle
        uses: actions/upload-artifact@v4
        with:
          name: server-bundle-${{ steps.version.outputs.VERSION }}
          path: release-bundle/
          retention-days: 30

      # ── Upload GitHub Pages artifact ──────────
      - name: Setup Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/koreader-dashboard/dist/pages

  # ──────────────────────────────────────────────
  # Release — only on push to main
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server bundle
        uses: actions/download-artifact@v4
        with:
          name: server-bundle-${{ needs.build.outputs.version }}
          path: release-bundle/

      # ── Package server files into a zip ──────────
      - name: Create server zip
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          cd release-bundle
          # Remove the ps1 from the server zip (it's a separate release asset)
          rm -f koreader-sync.ps1
          zip -r "../koreader-sync-server-${VERSION}.zip" .
          cd ..
          ls -lh koreader-sync-server-*.zip

      # ── Extract release notes from CHANGELOG ────────
      - name: Extract release notes
        id: notes
        run: |
          # Pull the first versioned section out of CHANGELOG.md
          # (everything between the first "## [" heading and the second one)
          awk '/^## \[[0-9]/{found++} found==1{print} found==2{exit}' CHANGELOG.md > changelog_section.md

          cat > release_notes.md << 'EOMD'
          ## Installation

          Download `koreader-sync.ps1` and run it on your Windows server (Administrator PowerShell):

          ```powershell
          .\koreader-sync.ps1
          ```

          The script handles fresh installs and updates automatically.

          ---

          EOMD
          cat changelog_section.md >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "Full history: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)" >> release_notes.md

      # ── Create Git tag ──────────────────────────
      - name: Create Git tag
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      # ── Create GitHub Release ────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "KOReader Sync ${{ needs.build.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            koreader-sync.ps1
            koreader-sync-server-${{ needs.build.outputs.version }}.zip

  # ──────────────────────────────────────────────
  # GitHub Pages preview — only on push to main
  # ──────────────────────────────────────────────
  pages:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
